name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'    # vitest 4.x needs >=20.12.0 (styleText in node:util)
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts --max-warnings 0
      - run: npm run verify-checksums
      - run: npx vitest run --coverage
      - run: npm audit --audit-level=high

  seed-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'    # keep in sync with build-and-test
          cache: 'npm'
      - run: npm ci
      - run: npm run verify-checksums
