name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create GitHub Release
  id-token: write      # OIDC token for npm provenance attestation
  attestations: write  # store the provenance attestation

jobs:
  test:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts --max-warnings 0

      - name: Verify seed checksums
        run: npm run verify-checksums

      - name: Run tests
        run: npx vitest run
        env:
          CI: true   # skips native-SQLite integration tests (macOS-only binary)

      - name: Security audit
        run: npm audit --audit-level=high

  publish:
    name: Publish to npm (with provenance)
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + bundle + copy templates)
        run: npm run build
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: false
          body_path: ${{ github.workspace }}/.github/RELEASE_NOTES.md
        continue-on-error: true
